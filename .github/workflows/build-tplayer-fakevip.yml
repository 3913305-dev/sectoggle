name: Build TPlayerFakeVIP.dylib

on:
  workflow_dispatch:
  push:
    paths:
      - 'TPlayerFakeVIP/**'
      - '.github/workflows/build-tplayer-fakevip.yml'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build TPlayerFakeVIP.dylib
        run: |
          cd TPlayerFakeVIP
          set -e
          if ! xcrun -sdk iphoneos clang -arch arm64 \
            -Wno-deprecated-declarations \
            -Wno-incompatible-function-pointer-types \
            -dynamiclib -fobjc-arc \
            -framework UIKit -framework Foundation \
            -install_name @executable_path/TPlayerFakeVIP.dylib \
            -o TPlayerFakeVIP.dylib TPlayerFakeVIP.m \
            -miphoneos-version-min=14.0 > build.log 2>&1; then
            echo "=== build failed ==="
            cat build.log
            grep -E 'error:|warning:' build.log | head -20 | while IFS= read -r line; do
              echo "::error title=clang::$line"
            done
            exit 1
          fi
          cat build.log
          file TPlayerFakeVIP.dylib
          ls -la TPlayerFakeVIP.dylib

      - uses: actions/upload-artifact@v4
        with:
          name: TPlayerFakeVIP.dylib
          path: TPlayerFakeVIP/TPlayerFakeVIP.dylib
          retention-days: 30
