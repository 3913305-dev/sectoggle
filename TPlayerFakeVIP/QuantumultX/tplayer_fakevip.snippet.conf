# ============================================================
# TPlayer 特别玩家 — Quantumult X 全方位重写（内测）
# 对齐 TPlayerFakeVIP.dylib v7 拦截的接口
#
# 使用步骤：
# 1. 设置 → MitM → 开启，安装并信任证书
# 2. 设置 → 重写 → 导入本片段，或复制到 profile 末尾
# 3. 设置 → 脚本 → 本地 → 导入 tplayer_fakevip.js
# 4. 重写里 script 文件名与本地脚本名一致
# 5. 特别玩家走 QX 代理（增强模式/全局）
# 6. 杀掉 App → 退出登录 → 重新登录
#
# 限制（相对 dylib）：
# - 无法写 UserDefaults（dashboard_unlocked_dial_ids）
# - 登录 encrypted:true 时只能整包明文 bypass，可能丢 token
# - 表盘若仍锁，请继续用 TPlayerFakeVIP.dylib
# ============================================================

[mitm]
hostname = teslaapi.twanjia.com, *.twanjia.com

[rewrite]
# --- 会员 / 用户 ---
^https?:\/\/teslaapi\.twanjia\.com\/vip\/checkVipStatus url script-response-body tplayer_fakevip.js
^https?:\/\/teslaapi\.twanjia\.com\/user\/getUserInfo url script-response-body tplayer_fakevip.js
^https?:\/\/teslaapi\.twanjia\.com\/vip\/activateWithIAP url script-response-body tplayer_fakevip.js
^https?:\/\/teslaapi\.twanjia\.com\/vip\/getPlanList url script-response-body tplayer_fakevip.js

# --- 登录 / 注册 / 账号合并（表盘解锁关键）---
^https?:\/\/teslaapi\.twanjia\.com\/auth\/phone\/login url script-response-body tplayer_fakevip.js
^https?:\/\/teslaapi\.twanjia\.com\/auth\/phone\/password_login url script-response-body tplayer_fakevip.js
^https?:\/\/teslaapi\.twanjia\.com\/auth\/wechat\/app_login url script-response-body tplayer_fakevip.js
^https?:\/\/teslaapi\.twanjia\.com\/auth\/apple\/login url script-response-body tplayer_fakevip.js
^https?:\/\/teslaapi\.twanjia\.com\/auth\/email\/login url script-response-body tplayer_fakevip.js
^https?:\/\/teslaapi\.twanjia\.com\/auth\/email\/register url script-response-body tplayer_fakevip.js
^https?:\/\/teslaapi\.twanjia\.com\/user\/accountMergeCommit url script-response-body tplayer_fakevip.js

# --- 特效 / 壁纸解锁 ---
^https?:\/\/teslaapi\.twanjia\.com\/effect\/myUnlocks url script-response-body tplayer_fakevip.js
^https?:\/\/teslaapi\.twanjia\.com\/wallpaper\/getMyUnlocks url script-response-body tplayer_fakevip.js
^https?:\/\/teslaapi\.twanjia\.com\/wallpaper\/iapProducts url script-response-body tplayer_fakevip.js

# --- 兜底：teslaapi 其它 JSON（encrypted 整包 bypass）---
^https?:\/\/teslaapi\.twanjia\.com\/ url script-response-body tplayer_fakevip.js

# 可选：仅让特别玩家域名走 MITM（在 [filter_local] 或策略组里把
# teslaapi.twanjia.com 指向带 MITM 的策略，避免全局解密）
