# ============================================================
# 方式1 修正版 — 只需「脚本 + MitM」，不用单独加重写
# ============================================================
#
# 步骤 1 — MitM
#   设置 → MitM → 开启 → 信任证书
#   主机名添加：teslaapi.twanjia.com
#
# 步骤 2 — 脚本（整行复制，含 tag 参数）
#   设置 → 脚本 → + → 引用 / 从 URL 导入
#   粘贴下面 [script] 里那一整行（不是只粘 URL）
#
# 步骤 3 — 特别玩家走 QX 代理 → 杀 App → 退出登录 → 重新登录
#
# 若仍无效：设置 → 脚本 → 点进 tplayer_fakevip → 看是否有报错
# ============================================================

[script]
https://raw.githubusercontent.com/3913305-dev/sectoggle/main/TPlayerFakeVIP/QuantumultX/tplayer_fakevip.js, tag=tplayer_fakevip.js, enabled=true

[mitm]
hostname = teslaapi.twanjia.com

